<div class="bmi-tool">

<style>
.bmi-tool{
max-width:450px;
margin:20px auto;
font-family:Arial,sans-serif;
}

.bmi-box{
background:linear-gradient(135deg,#6d28d9,#4c1d95);
padding:25px;
border-radius:22px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
color:#fff;
text-align:center;
}

.bmi-box h2{
margin-bottom:15px;
}

.bmi-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

.bmi-box button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#a855f7;
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:rgba(255,255,255,.15);
border-radius:12px;
display:none;
}

.category{
font-size:18px;
font-weight:bold;
margin-top:10px;
}
</style>

<div class="bmi-box">

<h2>⚖ BMI Calculator</h2>

<input type="number" id="weight" placeholder="Enter Weight (kg)">
<input type="number" id="height" placeholder="Enter Height (cm)">

<button onclick="calculateBMI()">Calculate BMI</button>

<div class="result" id="result">

<div>Your BMI: <span id="bmiValue"></span></div>
<div class="category" id="bmiCategory"></div>

</div>

</div>

<script>
function calculateBMI(){

let weight=document.getElementById("weight").value;
let height=document.getElementById("height").value;

if(weight=="" || height==""){
alert("Please enter weight and height");
return;
}

height=height/100;

let bmi=weight/(height*height);
bmi=bmi.toFixed(2);

document.getElementById("bmiValue").innerText=bmi;

let category="";

if(bmi<18.5){
category="Underweight";
}
else if(bmi<25){
category="Normal Weight";
}
else if(bmi<30){
category="Overweight";
}
else{
category="Obese";
}

document.getElementById("bmiCategory").innerText=category;

document.getElementById("result").style.display="block";
}
</script>

</div>
