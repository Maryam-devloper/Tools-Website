<div class="cgpa-tool">

<style>

.cgpa-tool *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

.cgpa-tool{
    background:linear-gradient(135deg,#667eea,#764ba2,#6dd5ed);
    padding:25px;
    border-radius:20px;
    max-width:550px;
    margin:30px auto;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.cgpa-tool h1{
    text-align:center;
    margin-bottom:10px;
    font-size:32px;
  	color:white;
}

.cgpa-tool p{
    text-align:center;
    margin-bottom:25px;
}

.cgpa-tool .semester-box{
    display:flex;
    gap:12px;
    margin-bottom:18px;
    background:rgba(255,255,255,0.12);
    padding:10px;
    border-radius:18px;
    backdrop-filter:blur(8px);
}

.cgpa-tool input{
    flex:1;
    padding:18px;
    border:none;
    border-radius:16px;
    outline:none;
    font-size:18px;
    font-weight:bold;
    color:#222;

    background:linear-gradient(
    135deg,
    #ffffff,
    #f3f9ff
    );

    border:3px solid transparent;

    box-shadow:
    0 4px 15px rgba(0,0,0,0.15),
    inset 0 2px 5px rgba(255,255,255,0.8);

    transition:0.3s;
}

.cgpa-tool input:focus{

    background:white;

    border:3px solid #00e5ff;

    box-shadow:
    0 0 15px rgba(0,229,255,0.7),
    0 0 30px rgba(0,229,255,0.3);

    transform:scale(1.03);
}

.cgpa-tool input::placeholder{
    color:#666;
    font-weight:500;
}

.cgpa-tool .remove-btn{
    width:50px;
    border:none;
    border-radius:12px;
    background:#ff4d4d;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.cgpa-tool .btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

.cgpa-tool .add-btn{
    background:linear-gradient(45deg,#00c853,#64dd17);
}

.cgpa-tool .calc-btn{
    background:linear-gradient(45deg,#ff512f,#dd2476);
}

.cgpa-tool .result{
    margin-top:25px;
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:15px;
    text-align:center;
    display:none;
}

.cgpa-tool .cgpa{
    font-size:45px;
    font-weight:bold;
    color:#ffeaa7;
}

</style>

<h1>CGPA Calculator</h1>

<p>Enter GPA of All Studied Semesters and Calculate CGPA Instantly</p>

<div id="semesterContainer">

    <div class="semester-box">

        <input type="number"
        step="0.01"
        placeholder="Enter Semester GPA"
        class="gpaInput">

        <button class="remove-btn"
        onclick="removeSemester(this)">×</button>

    </div>

</div>

<button class="btn add-btn"
onclick="addSemester()">

+ Add Semester

</button>

<button class="btn calc-btn"
onclick="calculateCGPA()">

Calculate CGPA

</button>

<div class="result" id="resultBox">

    <h2>Your CGPA</h2>

    <div class="cgpa" id="cgpaResult">0.00</div>

</div>

<script>

function addSemester(){

    let container =
    document.getElementById('semesterContainer');

    let div = document.createElement('div');

    div.className = 'semester-box';

    div.innerHTML = `
    <input type="number"
    step="0.01"
    placeholder="Enter Semester GPA"
    class="gpaInput">

    <button class="remove-btn"
    onclick="removeSemester(this)">×</button>
    `;

    container.appendChild(div);
}

function removeSemester(button){

    let container =
    document.getElementById('semesterContainer');

    if(container.children.length > 1){

        button.parentElement.remove();

    }
}

function calculateCGPA(){

    let inputs =
    document.querySelectorAll('.gpaInput');

    let total = 0;

    let count = 0;

    inputs.forEach(function(input){

        let value = parseFloat(input.value);

        if(!isNaN(value)){

            total += value;

            count++;

        }

    });

    if(count == 0){

        alert('Enter GPA values');

        return;
    }

    let cgpa = total / count;

    document.getElementById('cgpaResult')
    .innerHTML = cgpa.toFixed(2);

    document.getElementById('resultBox')
    .style.display = 'block';
}

</script>

</div>
