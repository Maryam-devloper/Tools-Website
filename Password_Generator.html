<div class="password-generator">

<style>
.password-generator{
max-width:500px;
margin:20px auto;
font-family:Arial,sans-serif;
}

.pass-box{
background:linear-gradient(135deg,#6d28d9,#4c1d95);
padding:25px;
border-radius:22px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.pass-box h2{
color:#fff;
text-align:center;
margin-bottom:20px;
}

.password-output{
display:flex;
gap:10px;
margin-bottom:20px;
}

.password-output input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:#fff;
color:#111827;
}

.password-output button{
padding:14px 18px;
border:none;
border-radius:12px;
background:#a855f7;
color:#fff;
cursor:pointer;
font-weight:bold;
}

.option{
margin-bottom:12px;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
}

.option label{
font-weight:600;
}

.option input[type="checkbox"]{
transform:scale(1.2);
}

.length-box{
color:#fff;
margin-bottom:15px;
}

.length-box input{
width:100%;
margin-top:8px;
}

.generate-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#c084fc;
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.generate-btn:hover{
opacity:.9;
}

.strength{
margin-top:15px;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,.12);
color:#fff;
text-align:center;
font-weight:bold;
}
</style>

<div class="pass-box">

<h2>Password Generator</h2>

<div class="password-output">
<input type="text" id="password" readonly>
<button onclick="copyPassword()">Copy</button>
</div>

<div class="length-box">
Password Length:
<span id="lengthValue">12</span>
<input type="range" id="length" min="4" max="50" value="12">
</div>

<div class="option">
<label>Uppercase Letters</label>
<input type="checkbox" id="uppercase" checked>
</div>

<div class="option">
<label>Lowercase Letters</label>
<input type="checkbox" id="lowercase" checked>
</div>

<div class="option">
<label>Numbers</label>
<input type="checkbox" id="numbers" checked>
</div>

<div class="option">
<label>Symbols</label>
<input type="checkbox" id="symbols" checked>
</div>

<button class="generate-btn" onclick="generatePassword()">
Generate Password
</button>

<div class="strength" id="strength">
Strength: Medium
</div>

</div>

<script>
const lengthSlider=document.getElementById("length");
const lengthValue=document.getElementById("lengthValue");

lengthSlider.oninput=function(){
lengthValue.textContent=this.value;
};

function generatePassword(){

const upper="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lower="abcdefghijklmnopqrstuvwxyz";
const nums="0123456789";
const symbols="!@#$%^&*()_+{}[]<>?/";

let chars="";

if(document.getElementById("uppercase").checked)
chars+=upper;

if(document.getElementById("lowercase").checked)
chars+=lower;

if(document.getElementById("numbers").checked)
chars+=nums;

if(document.getElementById("symbols").checked)
chars+=symbols;

if(chars===""){
alert("Select at least one option");
return;
}

let length=parseInt(lengthSlider.value);
let password="";

for(let i=0;i<length;i++){
password+=chars.charAt(
Math.floor(Math.random()*chars.length)
);
}

document.getElementById("password").value=password;

updateStrength(length);
}

function updateStrength(length){

let text="Weak";

if(length>=8) text="Medium";
if(length>=12) text="Strong";
if(length>=16) text="Very Strong";

document.getElementById("strength").innerHTML=
"Strength: "+text;
}

function copyPassword(){

let pass=document.getElementById("password");

if(pass.value===""){
alert("Generate a password first");
return;
}

navigator.clipboard.writeText(pass.value);

alert("Password copied!");
}

generatePassword();
</script>

</div>
