<div class="unit-pro">

<style>
.unit-pro{
max-width:520px;
margin:20px auto;
font-family:Arial,sans-serif;
}

.box{
background:linear-gradient(135deg,#6d28d9,#4c1d95);
padding:25px;
border-radius:22px;
color:#fff;
text-align:center;
}

h2{
margin-bottom:15px;
}

label{
display:block;
text-align:left;
margin-top:10px;
font-size:14px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

.row{
display:flex;
gap:10px;
align-items:center;
}

.row select{
width:45%;
}

.swap{
width:10%;
background:#a855f7;
border:none;
border-radius:10px;
color:#fff;
font-size:18px;
cursor:pointer;
height:45px;
margin-top:5px;
}

button.convert{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:#a855f7;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:15px;
padding:12px;
background:rgba(255,255,255,0.15);
border-radius:10px;
font-size:18px;
}
</style>

<div class="box">

<h2>🔄 Unit Converter</h2>

<!-- VALUE -->
<label>Value</label>
<input type="number" id="value" placeholder="Enter value">

<!-- TYPE -->
<label>Unit Type</label>
<select id="type">
<option value="length">Length</option>
<option value="weight">Weight</option>
<option value="temp">Temperature</option>
</select>

<!-- FROM TO -->
<label>Convert From → To</label>
<div class="row">
<select id="from"></select>

<button class="swap" onclick="swapUnits()">🔁</button>

<select id="to"></select>
</div>

<button class="convert" onclick="convert()">Convert</button>

<div class="result" id="result">Result will appear here</div>

</div>

</div>

<script>
const units = {
length: {
m: 1,
cm: 100,
km: 0.001,
inch: 39.3701,
feet: 3.28084
},
weight: {
kg: 1,
g: 1000,
lb: 2.20462
},
temp: ["C","F","K"]
};

let type = document.getElementById("type");
let from = document.getElementById("from");
let to = document.getElementById("to");

function loadUnits(){
from.innerHTML="";
to.innerHTML="";

let t = type.value;

if(t === "temp"){
units.temp.forEach(u=>{
from.innerHTML += `<option value="${u}">${u}</option>`;
to.innerHTML += `<option value="${u}">${u}</option>`;
});
}else{
for(let u in units[t]){
from.innerHTML += `<option value="${u}">${u}</option>`;
to.innerHTML += `<option value="${u}">${u}</option>`;
}
}
}

type.addEventListener("change", loadUnits);
loadUnits();

function swapUnits(){
let temp = from.value;
from.value = to.value;
to.value = temp;
}

function convert(){
let val = parseFloat(document.getElementById("value").value);
let t = type.value;
let f = from.value;
let toU = to.value;

if(isNaN(val)){
document.getElementById("result").innerText = "Enter value first";
return;
}

// LENGTH / WEIGHT
if(t !== "temp"){
let base = val / units[t][f];
let res = base * units[t][toU];
document.getElementById("result").innerText = res.toFixed(4);
return;
}

// TEMP
let res;

if(f === "C"){
res = (toU === "F") ? (val*9/5+32) :
(toU === "K") ? (val+273.15) : val;
}
else if(f === "F"){
res = (toU === "C") ? ((val-32)*5/9) :
(toU === "K") ? ((val-32)*5/9+273.15) : val;
}
else if(f === "K"){
res = (toU === "C") ? (val-273.15) :
(toU === "F") ? ((val-273.15)*9/5+32) : val;
}

document.getElementById("result").innerText = res.toFixed(2);
}
</script>
